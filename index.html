<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WRC Broadcast UI Replica</title>
<style>
    /* =========================================================
       1. フォントの読み込み（アップロードされたファイルへのパス）
       ========================================================= */
    @font-face {
        font-family: 'WRCCleanRoman';
        src: url('./WRCCleanRoman.woff2') format('woff2'),
             url('./WRCCleanRoman.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }
    @font-face {
        font-family: 'WRCCleanBold';
        src: url('./WRCCleanBold.woff2') format('woff2'),
             url('./WRCCleanBold.ttf') format('truetype');
        font-weight: bold;
        font-style: normal;
    }

    /* 汎用クラス */
    .font-roman { font-family: 'WRCCleanRoman', sans-serif; font-weight: normal; }
    .font-bold { font-family: 'WRCCleanBold', sans-serif; font-weight: bold; }

    /* =========================================================
       2. ベース設定・背景（路面ディテールの確認用）
       ========================================================= */
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        /* 背景にアスファルトのような画像を置くと75%透過グレーが映えます */
        background: url('https://images.unsplash.com/photo-1541443131586-f4a43b184f49?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
        overflow: hidden;
    }

    /* =========================================================
       3. UIコンテナレイアウト（浮遊型・ジェスチャーバー回避）
       ========================================================= */
    .wrc-ui-container {
        position: fixed;
        bottom: 45px; /* スマホ等のジェスチャーバーを避ける隙間 */
        left: 5%;
        right: 5%;
        height: 80px; /* 右側のロゴパネルの最大高さに合わせる */
        display: flex;
        align-items: flex-end; /* 下端揃え */
        text-transform: uppercase; /* すべて大文字にして高さを一定に */
    }

    /* すべてのテキストにドロップシャドウを適用 */
    .wrc-text-shadow {
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.6);
    }

    /* =========================================================
       4. メインバー（グレーとオレンジのテロップ）
       ========================================================= */
    .wrc-main-bar {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 64px; /* TVセーフエリア規定に基づく厚み */
        display: flex;
        gap: 2px; /* オレンジとグレーのつなぎ目の1〜2pxの細い隙間 */
        /* 上辺が右、下辺が左の「／」角度。子要素のテキストも15度右に傾斜します */
        transform: skewX(-15deg);
        transform-origin: bottom left;
        z-index: 5;
    }

    /* 左側：オレンジエリア（時間情報） */
    .wrc-zone-orange {
        background-color: #FF5500; /* 発光しているような高彩度オレンジ */
        flex: 0 0 160px; /* 文字の長さに合わせて可変せず一定の幅 */
        border-radius: 6px; /* 角丸の処理（境界にも適用） */
        border: 1px solid rgba(255, 255, 255, 0.2); /* 1pxの外枠 */
        display: flex;
        align-items: center;
        justify-content: flex-end; /* 右揃えで境界線を挟んで対比 */
        padding-right: 15px;
    }

    .wrc-time-wrapper {
        color: #FFFFFF;
        display: flex;
        align-items:baseline;
    }

    .wrc-time-digits {
        font-variant-numeric: tabular-nums; /* 等幅フォント化 */
        font-size: 26px;
    }

    .wrc-time-colon {
        font-family: 'WRCCleanRoman', sans-serif;
        font-weight: normal; /* 数字より少し細いデザイン */
        margin: 0 2px;
        opacity: 0.9;
    }

    .wrc-time-local {
        font-size: 13px;
        margin-left: 8px;
    }

    /* 右側：グレーエリア（番組情報・ハッシュタグ） */
    .wrc-zone-gray {
        background-color: rgba(40, 42, 45, 0.75); /* アスファルトを連想させるチャコールグレー（75%透過） */
        flex-grow: 1; /* 残りの幅を埋める */
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.2); /* 1pxの外枠 */
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-left: 20px;
        padding-right: 230px; /* 右下のロゴパネルにぶつからないギリギリの余白 */
    }

    .wrc-gray-left {
        display: flex;
        align-items: center;
    }

    .wrc-coming-up {
        color: #FF5500; /* 背景のグレーと補色関係にあるオレンジ */
        font-size: 14px;
        letter-spacing: 2px; /* 十分な余白（レタースペーシング） */
        margin-right: 16px;
    }

    .wrc-show-title {
        color: #FFFFFF;
        font-size: 24px;
        /* Boldを使用し、他の文字より1.5倍太く見せる */
    }

    .wrc-hashtag {
        color: #D0D0D0; /* 真っ白ではなく少しグレーに寄せる */
        font-size: 20px;
    }

    /* =========================================================
       5. 右下ロゴパネル（一番上のレイヤー）
       ========================================================= */
    .wrc-logo-panel {
        position: absolute;
        right: 0;
        bottom: 0;
        height: 76px; /* メインバーよりわずかに大きい高さ */
        display: flex;
        gap: 2px;
        transform: skewX(-15deg); /* バーと同じ斜めカット */
        transform-origin: bottom right;
        z-index: 10; /* 手前にあるように見せるレイヤー処理 */
    }

    /* 青いRロゴエリア */
    .wrc-logo-blue {
        background-color: #001A70; /* WRC公式ブランドブルー */
        width: 60px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .wrc-logo-r {
        color: #FFFFFF;
        font-size: 40px;
        line-height: 1;
    }

    /* 大会詳細情報エリア（白背景） */
    .wrc-logo-white {
        background-color: #FFFFFF;
        width: 150px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: 15px;
        position: relative; /* バッジ配置用 */
    }

    /* 差し色の赤いバッジ */
    .wrc-red-badge {
        position: absolute;
        top: 8px;
        right: 10px;
        width: 6px;
        height: 6px;
        background-color: #E60000;
        border-radius: 1px;
    }

    .wrc-event-details {
        color: #1E2023;
        font-size: 12px;
        line-height: 1.1;
        margin-bottom: 6px;
        /* 小さいフォントサイズで高密度に配置 */
    }

    /* スポンサーロゴのグリッド（ダミー配置） */
    .wrc-sponsor-grid {
        display: flex;
        gap: 4px;
    }

    .wrc-sponsor-placeholder {
        width: 18px;
        height: 8px;
        background-color: #B0B0B0;
        border-radius: 1.5px;
    }
</style>
</head>
<body>

<div class="wrc-ui-container">
    <div class="wrc-main-bar">
        <div class="wrc-zone-orange">
            <div class="wrc-time-wrapper wrc-text-shadow">
                <span class="font-bold wrc-time-digits">10<span class="wrc-time-colon">:</span>00</span>
                <span class="font-roman wrc-time-local">LOCAL</span>
            </div>
        </div>

        <div class="wrc-zone-gray">
            <div class="wrc-gray-left wrc-text-shadow">
                <span class="font-bold wrc-coming-up">COMING UP NEXT</span>
                <span class="font-bold wrc-show-title">SHAKEDOWN LIVE</span>
            </div>
            <div class="wrc-gray-right wrc-text-shadow">
                <span class="font-roman wrc-hashtag">#WRC</span>
            </div>
        </div>
    </div>

    <div class="wrc-logo-panel">
        <div class="wrc-logo-blue">
            <span class="font-bold wrc-logo-r">R</span>
        </div>
        <div class="wrc-logo-white">
            <div class="wrc-red-badge"></div>
            <div class="font-bold wrc-event-details">
                RALLY FORUM<br>OKAZAKI
            </div>
            <div class="wrc-sponsor-grid">
                <div class="wrc-sponsor-placeholder"></div>
                <div class="wrc-sponsor-placeholder"></div>
                <div class="wrc-sponsor-placeholder"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
